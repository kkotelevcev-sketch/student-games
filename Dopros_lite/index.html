<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="https://telegram.org"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДОПРОС: ОБЪЕКТ А-44 | V7.1 (STABLE)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --panel-border: #334155;
            --accent: #f59e0b;
            --accent-hover: #fbbf24;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --red: #ef4444;
            --green: #10b981;
            --note-bg: #fef08a; 
            --note-text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
            overflow-y: auto;
        }

        #app { width: 900px; max-width: 95%; display: flex; flex-direction: column; gap: 20px; position: relative; }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
        }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--panel-border); padding-bottom: 15px; margin-bottom: 20px; }
        .title { color: var(--text-main); font-weight: 800; font-size: 1.4em; letter-spacing: 1px; }
        .badge { background: #334155; padding: 5px 12px; border-radius: 20px; font-size: 0.85em; font-weight: bold; color: var(--accent); }

        .trait-grid { display: grid; gap: 15px; margin-top: 20px; }
        .trait-row { display: flex; gap: 15px; align-items: stretch; }
        .vs-badge { display: flex; align-items: center; color: var(--text-muted); font-size: 0.8em; font-weight: bold; }
        
        .trait-card {
            flex: 1; background: #0f172a; border: 2px solid #334155; border-radius: 10px;
            padding: 20px; cursor: pointer; transition: all 0.3s; text-align: center; position: relative;
        }
        .trait-card:hover:not(.disabled) { border-color: #64748b; transform: translateY(-3px); }
        .trait-card.selected { border-color: var(--accent); background: rgba(245, 158, 11, 0.05); }
        .trait-card.selected::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--accent); }
        .trait-card.disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(100%); }
        
        .trait-icon { font-size: 2em; margin-bottom: 10px; display: block; }
        .trait-title { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; color: var(--text-main); }
        .trait-desc { font-size: 0.85em; color: var(--text-muted); }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .stat-bar-bg { height: 12px; background: #0f172a; border-radius: 6px; overflow: hidden; margin-top: 8px; border: 1px solid #334155; }
        .stat-bar-fill { height: 100%; transition: width 0.6s ease; }
        .stat-label { display: flex; justify-content: space-between; font-size: 0.85em; font-weight: 600; text-transform: uppercase; color: var(--text-muted); }

        .tools-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; gap: 15px; }
        .evidence-bar { flex: 1; display: flex; gap: 10px; padding: 15px; background: #0f172a; border-radius: 8px; border: 1px dashed var(--panel-border); align-items: center; min-height: 24px; }
        .evidence-tag { background: rgba(245, 158, 11, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 4px; font-size: 0.8em; font-weight: bold; animation: popIn 0.3s ease; }
        
        .btn-notebook { background: #334155; border: 1px solid #475569; color: var(--text-main); padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-notebook:hover { background: #475569; border-color: var(--accent); color: var(--accent); }

        #narrative { font-size: 1.15em; line-height: 1.6; margin-bottom: 25px; min-height: 120px; }
        .speaker-name { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 0.85em; display: block; margin-bottom: 8px; letter-spacing: 1px; }
        
        .clickable-word { color: #38bdf8; border-bottom: 1px dashed #38bdf8; cursor: pointer; transition: 0.2s; }
        .clickable-word:hover { color: #bae6fd; border-bottom-style: solid; }
        .clickable-word.found { color: var(--green); border-bottom-color: var(--green); cursor: default; }

        .choices { display: flex; flex-direction: column; gap: 12px; }
        .choice-btn { background: #0f172a; border: 1px solid var(--panel-border); color: var(--text-main); padding: 18px 20px; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; font-size: 1em; display: flex; justify-content: space-between; align-items: center; }
        .choice-btn:hover { background: #1e293b; border-color: var(--text-muted); transform: translateX(5px); }
        .choice-req { font-size: 0.75em; padding: 4px 8px; border-radius: 4px; background: #334155; color: var(--text-muted); font-weight: bold; }
        
        .main-btn { width: 100%; padding: 18px; border-radius: 8px; background: var(--accent); color: #000; font-weight: 800; font-size: 1.1em; border: none; cursor: pointer; margin-top: 20px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .main-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .main-btn:hover:not(:disabled) { background: var(--accent-hover); }

        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        #modal-overlay.active { opacity: 1; visibility: visible; }
        
        .notebook-container { background: #cbd5e1; width: 600px; max-width: 90%; max-height: 80vh; border-radius: 8px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; transform: translateY(20px); transition: 0.3s; }
        #modal-overlay.active .notebook-container { transform: translateY(0); }
        
        .notebook-header { background: #334155; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .notebook-header h2 { margin: 0; font-size: 1.2em; display: flex; align-items: center; gap: 10px; }
        .btn-close { background: none; border: none; color: white; font-size: 1.5em; cursor: pointer; transition: 0.2s; }
        .btn-close:hover { color: var(--red); }
        
        .notebook-body { padding: 25px; overflow-y: auto; background: repeating-linear-gradient( #f8fafc, #f8fafc 29px, #e2e8f0 30px ); font-family: 'Courier New', Courier, monospace; color: var(--note-text); }
        
        .note-section-title { font-weight: bold; font-size: 1.1em; border-bottom: 2px solid #94a3b8; padding-bottom: 5px; margin: 20px 0 10px 0; color: #334155; }
        .note-section-title:first-child { margin-top: 0; }
        
        .notebook-list { list-style-type: none; padding: 0; margin: 0; }
        .notebook-list li { margin-bottom: 12px; line-height: 1.5; font-size: 1.05em; padding-left: 15px; position: relative; }
        .notebook-list li::before { content: "•"; position: absolute; left: 0; color: #3b82f6; font-weight: bold; }

        .hidden { display: none !important; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .rank-display { font-size: 6em; font-weight: 900; text-align: center; color: var(--accent); text-shadow: 0 0 30px rgba(245, 158, 11, 0.4); margin: 0; }
    </style>
</head>
<body>

</div>

<script>
    // --- СОСТОЯНИЕ ИГРЫ ---
    const state = {
        traits: new Set(),
        evidence: new Set(),
        notes: ["Начат допрос Артура Вудса. Семья пропала ночью. Подозреваемый выглядит раздраженным."],
        turn: 1,
        rapport: 30,
        stress: 40,
        currentNode: 'start'

    // --- НАСТРОЙКИ УМЕНИЙ ---

        { l: {id:"emp", icon:"💜", n:"Эмпатия", d:"Доверие и понимание"}, r: {id:"dom", icon:"👊", n:"Давление", d:"Доминирование и страх"} },

        { l: {id:"obs", icon:"👁️", n:"Наблюдение", d:"Детали и язык тела"}, r: {id:"psy", icon:"🧠", n:"Психология", d:"Мотивы и травмы"} },
        { l: {id:"pat", icon:"⏳", n:"Терпение", d:"Паузы и выжидание"}, r: {id:"agg", icon:"⚡", n:"Напор", d:"Агрессия и скорость"} }
    ];

    // --- СЛОВАРЬ УЛИК ---
    const evidenceDict = {

        'jacket': { name: '🧥 Куртка Артура', desc: 'Обычная куртка. В карманах найдены ключи.' },

        'phone': { name: '📱 Второй телефон', desc: 'Скрытый телефон с перепиской от некой Николь.' },

    // --- СЦЕНАРИЙ ---

            speaker: "Артур Вудс",

                { txt: "Давайте посмотрим на вашу куртку. (Осмотреть)", req: "obs", reqEv: "jacket", next: "find_keys", eff: {r:0, s:10} },

            ]
        },
        'find_keys': {

                { txt: "Рассказывайте дальше. Не останавливайтесь.", req: null, next: "attempt_confession", eff: {r:0, s:10} } // Безопасный выбор
            ]
        },
        'attempt_confession': {
            get speaker() { return state.turn < 10 ? "Артур Вудс" : "Артур Вудс (Сломлен)" },
            get note() { return state.turn < 10 ? "Пытался дожать его, но слишком рано. Он закрывается." : "ФИНАЛ: Подозреваемый сломлен. Дал признательные показания." },
            get text() { 
                return state.turn < 10 
                    ? "Нет! Я ничего не делал! Я требую адвоката! Я больше не скажу ни слова, пока он не приедет!" 
                    : "(Падает на колени). Я отвез их к старому карьеру за городом... Дети живы, я запер их в домике лесника. Клара... она в багажнике пикапа. Пожалуйста, спасите детей.";
            },
            get isEnd() { return state.turn >= 10; },
            choices: [
                { txt: "Рано давить. Нужно больше деталей. (Вернуться к допросу)", req: null, next: "loop_hub", condition: () => state.turn < 10 },
                { txt: "ЗАВЕРШИТЬ ДОПРОС. ВЫСЛАТЬ ОПЕРГРУППУ.", req: null, next: "end_win", condition: () => state.turn >= 10 }
            ]
        },
        'end_win': {
            speaker: "СИСТЕМА", isEnd: true, rank: "S", title: "ДЕЛО РАСКРЫТО",
            text: "Вы успешно сломали подозреваемого, собрав улики и выдержав необходимый тайминг. Дети спасены."
        },
        'fail_stress': {
            speaker: "СИСТЕМА", isEnd: true, rank: "F", title: "СЛЕДСТВИЕ ЗАШЛО В ТУПИК",
            text: "Вы слишком сильно давили на подозреваемого. У него случился срыв, и адвокат прервал допрос. Улик недостаточно для суда."
        }
    };

    // --- ИНИЦИАЛИЗАЦИЯ UI ---
    function init() {
        const root = document.getElementById('traits-container');
        traitsConfig.forEach(pair => {
            const row = document.createElement('div');
            row.className = 'trait-row';
            
            [pair.l, pair.r].forEach(t => {
                const card = document.createElement('div');
                card.className = 'trait-card';
                card.dataset.id = t.id;
                card.innerHTML = `
                    <span class="trait-icon">${t.icon}</span>
                    <div class="trait-title">${t.n}</div>
                    <div class="trait-desc">${t.d}</div>
                `;
                
                card.onclick = () => {
                    if (card.classList.contains('disabled')) return;
                    
                    row.querySelectorAll('.trait-card').forEach(c => {
                        c.classList.remove('selected');
                        c.classList.add('disabled');
                        state.traits.delete(c.dataset.id);
                    });
                    
                    card.classList.add('selected');
                    card.classList.remove('disabled');
                    state.traits.add(t.id);
                    
                    document.getElementById('start-btn').disabled = state.traits.size < 4;
                };
                row.appendChild(card);
            });
            
            const vs = document.createElement('div');
            vs.className = 'vs-badge';
            vs.innerText = 'ИЛИ';
            row.insertBefore(vs, row.children[1]);
            
            root.appendChild(row);
        });

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            renderNode('start');
        };
    }

    // --- ПАРСЕР УЛИК В ТЕКСТЕ ---
    function parseText(text) {
        return text.replace(/\[\[(.*?)\|(.*?)\]\]/g, (match, word, id) => {
            const isFound = state.evidence.has(id);
            return `<span class="clickable-word ${isFound ? 'found' : ''}" data-ev="${id}" title="Кликните, чтобы добавить в улики">${word}</span>`;
        });
    }

    // Обработчик клика по тексту (для улик)
    document.getElementById('narrative').addEventListener('click', (e) => {
        if (e.target.classList.contains('clickable-word') && !e.target.classList.contains('found')) {
            const evId = e.target.dataset.ev;
            e.target.classList.add('found');
            state.evidence.add(evId);
            
            const evContainer = document.getElementById('evidence-container');
            if (state.evidence.size === 1) evContainer.innerHTML = '';
            
            const tag = document.createElement('span');
            tag.className = 'evidence-tag';
            tag.innerText = evidenceDict[evId].name;
            evContainer.appendChild(tag);
            
            updateNotebookUI();
            renderChoices(state.currentNode);
        }
    });

    // --- БЛОКНОТ (Логика) ---
    function toggleNotebook() {
        const modal = document.getElementById('modal-overlay');
        modal.classList.toggle('active');
        if (modal.classList.contains('active')) {
            updateNotebookUI();
        }
    }

    function updateNotebookUI() {
        const evList = document.getElementById('notebook-evidence-list');
        if (state.evidence.size > 0) {
            evList.innerHTML = '';
            state.evidence.forEach(id => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${evidenceDict[id].name}</strong>: ${evidenceDict[id].desc}`;
                evList.appendChild(li);
            });
        }

        const notesList = document.getElementById('notebook-notes-list');
        notesList.innerHTML = '';
        state.notes.forEach(note => {
            const li = document.createElement('li');
            li.innerText = note;
            notesList.appendChild(li);
        });
    }

    // --- ОТРИСОВКА УЗЛА ---
    function renderNode(id) {
        state.currentNode = id;
        const node = script[id];
        
        if (node.note && !state.notes.includes(node.note)) {
            state.notes.push(node.note);
            const btn = document.querySelector('.btn-notebook');
            btn.style.borderColor = 'var(--accent)';
            btn.style.color = 'var(--accent)';
            setTimeout(() => { btn.style.borderColor = ''; btn.style.color = ''; }, 1000);
        }

        if (node.isEnd) {
            document.getElementById('game-screen').innerHTML = `
                <div class="panel" style="display:flex; flex-direction:column; align-items:center; padding: 50px 20px;">
                    <h1 class="rank-display" style="color: ${node.rank === 'S' ? 'var(--green)' : 'var(--red)'}">${node.rank}</h1>
                    <h2 style="margin: 10px 0;">${node.title}</h2>
                    <p style="color: var(--text-muted); text-align: center; max-width: 500px; line-height: 1.6;">${node.text}</p>
                    <button class="main-btn" style="width: 300px; margin-top: 30px;" onclick="location.reload()">ЗАВЕРШИТЬ СИМУЛЯЦИЮ</button>
                </div>
            `;
            return;
        }

        document.getElementById('narrative').innerHTML = `
            <span class="speaker-name">${node.speaker}</span>
            ${parseText(node.text)}
        `;
        
        renderChoices(id);
    }

    // --- ОТРИСОВКА КНОПОК ---
    function renderChoices(id) {
        const node = script[id];
        const container = document.getElementById('choices-container');
        container.innerHTML = '';

        node.choices.forEach(c => {
            if (c.req && !state.traits.has(c.req)) return;
            if (c.reqEv && !state.evidence.has(c.reqEv)) return;
            if (c.condition && !c.condition()) return;

            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            
            let reqText = c.req ? traitsConfig.flatMap(p => [p.l, p.r]).find(t => t.id === c.req).n : 'БАЗОВЫЙ';
            if (c.reqEv) reqText += ` + УЛИКА`;

            btn.innerHTML = `
                <span style="flex:1; padding-right: 15px;">${c.txt}</span>
                <span class="choice-req">${reqText.toUpperCase()}</span>
            `;
            
            btn.onclick = () => {
                state.turn++;
                if (c.eff) {
                    state.rapport = Math.min(100, Math.max(0, state.rapport + c.eff.r));
                    state.stress = Math.min(100, Math.max(0, state.stress + c.eff.s));
                }
                updateUI();
                
                if (state.stress >= 100) renderNode('fail_stress');
                else renderNode(c.next);
            };
            container.appendChild(btn);
        });
    }

    // --- ОБНОВЛЕНИЕ UI ---
    function updateUI() {
        document.getElementById('ui-turn').innerText = state.turn;
        document.getElementById('ui-rapport-val').innerText = state.rapport + '%';
        document.getElementById('ui-stress-val').innerText = state.stress + '%';
        
        const bR = document.getElementById('ui-rapport-bar');
        bR.style.width = state.rapport + '%';
        bR.style.background = state.rapport > 60 ? 'var(--green)' : (state.rapport > 30 ? 'var(--accent)' : 'var(--red)');
        
        const bS = document.getElementById('ui-stress-bar');
        bS.style.width = state.stress + '%';
        bS.style.background = state.stress > 80 ? 'var(--red)' : (state.stress > 50 ? 'var(--accent)' : 'var(--green)');
    }

    // Старт
    init();
</script>
</body>
</html>
